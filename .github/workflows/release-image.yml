name: Release OpenCVE web image

on:
  pull_request:
    branches:
      - master
    paths:
      - web/**
      - .github/workflows/release-image.yml
  push:
    branches:
      - master
    paths:
      - web/**
      - .github/workflows/release-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/mdsoftware-de/opencve-web

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: opencve
          POSTGRES_PASSWORD: opencve
          POSTGRES_DB: opencve
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencve -d opencve"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.release
          target: test
          load: true
          tags: opencve-web:test-${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify migrations and SecOps tracking contract
        env:
          TEST_IMAGE: opencve-web:test-${{ github.sha }}
        run: >-
          docker run --rm --network host
          --entrypoint sh
          -e OPENCVE_DATABASE_URL=postgresql://opencve:opencve@localhost:5432/opencve
          "$TEST_IMAGE"
          -c "python manage.py migrate --noinput &&
          pytest -q tests/api/test_project_cve_tracking.py tests/api/v2/viewsets/test_project_cves.py"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build immutable production image
        id: production
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.release
          target: runtime
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record immutable digest
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.production.outputs.digest }}
        run: |
          test -n "$DIGEST"
          printf 'Image: `%s@%s`\n' "$IMAGE" "$DIGEST" >> "$GITHUB_STEP_SUMMARY"
